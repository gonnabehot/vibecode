version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
  redis:
    image: redis:7
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    env_file: .env
    depends_on:
      - db
      - redis
  worker:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    command: celery -A app.main worker --loglevel=info
    env_file: .env
    depends_on:
      - db
      - redis
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    env_file: .env
    depends_on:
      - backend
volumes:
  db-data:
